    <meta charset="UTF-8" />

      content="Prostructure Engineering Ltd is a professional construction and engineering company in Kigali, Rwanda. We deliver construction, electrical, plumbing, waterproofing, maintenance and supply services built on quality, precision and trust."

    <!-- ═══════════════════════════════════════
         STRUCTURED DATA — Local Business (JSON-LD)
         Tells Google exactly what kind of business
         this is, where it is, and how to contact it
         ═══════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "@id": "https://www.prostructure.rw/",
      "name": "Prostructure Engineering Ltd",
      "description": "Professional engineering and construction company in Kigali, Rwanda delivering construction, electrical, plumbing, waterproofing, maintenance and supply services.",
      "url": "https://www.prostructure.rw/",
      "logo": "https://www.prostructure.rw/logo.png",
      "image": "https://www.prostructure.rw/og-image.jpg",
      "telephone": "+250XXXXXXXXX",
      "email": "info@prostructure.rw",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "KG XXX St",
        "addressLocality": "Kigali",
        "addressCountry": "RW"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": -1.9441,
        "longitude": 30.0619
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
          "opens": "08:00",
          "closes": "17:00"
        },
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": "Saturday",
          "opens": "09:00",
          "closes": "13:00"
        }
      ],
      "sameAs": [
        "https://linkedin.com/company/prostructure",
        "https://instagram.com/prostructure"
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Engineering & Construction Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Construction" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Waterproofing & Humidity Solutions" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Plumbing" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Electrical Installation" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Maintenance & Repairing" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Supply Services" } }
        ]
      }
    }
